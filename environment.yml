name: ML-pytorch

channels:
- pytorch
- conda-forge
- defaults

dependencies:
- python=3.11
- pip

# Core ML
- pytorch::pytorch>=2.2
- pytorch::torchvision
- pytorch::cpuonly # remove this line and add pytorch::pytorch-cuda=12.1 for GPU

# Data & numerics
- numpy>=1.26
- pandas>=2.2
- scikit-learn>=1.4

# Visualisation
- matplotlib>=3.8
- seaborn>=0.13

# Notebooks
- jupyter
- ipykernel

# HDF5
- h5py>=3.12

- pip:
  - tqdm>=4.66
